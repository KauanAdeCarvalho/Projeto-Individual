<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./style/comentarios.css">
    <link rel="stylesheet" href="./style/funcionais.css">
    <title>Document</title>
</head>

<body onload="listarComentarios()">
    <div class="container">
        <div class="header">
            <h1>ÁREA FUNCIONAL</h1> <br><br><br>
            <div class="areas">
                <a href="./seuperfil.html">SEU PERFIL</a>
                <a href="./dashboard.html">DASHBOARD</a>
                <a href="./dashboard.html">QUIZ</a>
                <a class="ativo" href="./comentarios.html">COMENTÁRIOS</a>
                <a href="./index.html">SAIR </a>
            </div>
        </div>
        <div class="containerComentario">
            <div class="seuComentario">
                <h2>Insira seu Comentário</h2> 
                <textarea name="" placeholder="Insira seu comentário" id="comentarioUsuario"></textarea>
                <button class="botao" onclick="submeter()">OK</button>
                <span class="comentarioOk" id="comentarioOk">Comentário inserido com sucesso!!</span>
            </div> <br><br><br><br>
            <div class="containerComentariosComunidade">
                <h2>Todos Comentários</h2>
                <div class="comentariosComunidade" id="comentariosComunidade">
                </div>
            </div>
        </div>
    </div>
</body>

</html>
<script>

    function submeter() {

        let comentario = comentarioUsuario.value;

        let fkUsuario = sessionStorage.ID_USUARIO;

        if (comentario.trim() == "") {
            comentarioOk.style.display = 'none';
            return;
        } else {
            fetch("/comentarios/responder", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json",
                },
                body: JSON.stringify({
                    // crie um atributo que recebe o valor recuperado aqui
                    // Agora vá para o arquivo routes/usuario.js
                    comentarioServer: comentario,
                    fkUsuarioServer: fkUsuario
                }),
            })

            comentarioOk.style.display = 'flex';


            setTimeout(() => {
                comentarioOk.style.display = 'none';
            }, 2500);
        }

    }

        function listarComentarios() {
            fetch("/comentarios/listar")
                .then(res => res.json())
                .then(dados => {

                    console.log(dados);

                    const div = document.getElementById("comentariosComunidade");
                    comentariosComunidade.innerHTML = "";

                    dados.forEach(item => {
                        comentariosComunidade.innerHTML += `
                        <div class="comentarioUsuario">
                            <b>${item.login}:</b> <br> ${item.comentario} <br><br>
                        </div>
                    `;
                    });
                })
                .catch(erro => console.log(erro));
        }

</script>
