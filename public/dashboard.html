<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./style/dashboard.css">
    <link rel="stylesheet" href="./style/funcionais.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <title>Dashboard</title>
</head>

<body onload="buscarDados()">

    <div class="container">
        <div class="header">
            <h1>ÁREA FUNCIONAL</h1> <br><br><br>
            <div class="areas">
                <a href="./seuperfil.html">SEU PERFIL</a>
                <a class="ativo" href="./dashboard.html">DASHBOARD</a>
                <a href="./quiz.html">ANIME FAVORITO</a>
                <a href="./perguntas.html">QUIZ</a>
                <a href="./comentarios.html">COMENTÁRIOS</a>
                <a href="./index.html">SAIR</a>
            </div>
        </div>
        <div class="graficos">
            <div id="containerKpi" class="containerKpi">
                <div class="kpi">
                    <span id="tituloKpi1" class="tituloKpi">Anime mais votado</span>
                    <span id="resultadoKpi1" class="resultadoKpi"></span>
                </div>
                <div class="kpi">
                    <span id="tituloKpi2" class="tituloKpi">Total de votos</span>
                    <span id="resultadoKpi2" class="resultadoKpi"></span>
                </div>
                <div class="kpi">
                    <span id="tituloKpi3" class="tituloKpi">Tentativas no Quiz</span>
                    <span id="resultadoKpi3" class="resultadoKpi"></span>
                </div>
            </div> <br><br><br>
            <div class="g1">

                <div class="graficoPorcentagem">
                    <canvas id="graficoPorcentagem">
                    </canvas>
                </div>
                <div class="top10">
                    <h1>TOP 10 PLAYERS NO QUIZ</h1><br>
                    <div id="usuarioPodio" class="usuarioPodio">
                    </div>
                </div>


            </div> <br><br><br><br><br>
            <div class="graficoFavoritos">
                <canvas id="graficoFavoritos">
                </canvas>
            </div>
        </div>

    </div>

</body>

</html>
<script>

    usuario.innerHTML = sessionStorage.NOME_USUARIO;

    let proximaAtualizacao;

    window.onload = buscarDados();

    function buscarDados() {

        let votos = [];
        let animes = [];
        let acertos = '';
        let erros = '';

        fetch("/dashboard/buscarDadosAnimesFavoritos", {
            method: "GET"
        })
            .then(res => res.json())
            .then(dados => {

                console.log(dados);

                for (let i = 0; i < dados.length; i++) {

                    animes.push(dados[i].resposta);
                    votos.push(dados[i].votos);

                }
                const ctx = document.getElementById('graficoFavoritos');

                const grafico = new Chart(ctx, {
                    type: 'bar',
                    data: {
                        labels: animes,
                        datasets: [{
                            data: votos,
                            backgroundColor: '#6366f1',
                            borderColor: 'white',
                            borderWidth: 3
                        }]
                    },
                    options: {
                        responsive: true,
                        plugins: {
                            title: {
                                display: true,
                                text: 'Animes Favoritos',
                                color: '#ffffff',
                                font: {
                                    size: 25,
                                    weight: 'bold'
                                }
                            },
                            legend: {
                                display: false
                            }
                        },
                        scales: {
                            x: {
                                ticks: {
                                    color: 'white',
                                    font: {
                                        size: 19
                                    } 
                                }
                            },
                            y: {
                                beginAtZero: true,
                                ticks: {
                                    color: 'white',
                                    font: {
                                        size: 20
                                    }

                                }
                            }
                        }
                    }
                });
            })

        fetch('/dashboard/buscarPorcentagem', {
            method: "GET"
        })
            .then(res => res.json())
            .then(porcentagem => {

                console.log(porcentagem);

                acertos = porcentagem[0].porcentagemAcerto;
                erros = porcentagem[0].porcentagemErro;
                console.log(acertos);
                console.log(erros);

                const ctxPizza = document.getElementById('graficoPorcentagem');

                const grafico = new Chart(ctxPizza, {
                    type: 'doughnut',
                    data: {
                        labels: ['Acertos', 'Erros'],
                        datasets: [{
                            data: [acertos, erros],
                            backgroundColor: ['#22c55e', '#ef4444'],
                            borderColor: 'white',
                            borderWidth: 2
                        }]
                    },
                    options: {
                        responsive: true,
                        plugins: {
                            title: {
                                display: true,
                                text: 'Porcentagem de Acertos e Erros',
                                color: '#ffffff',
                                font: {
                                    size: 20,
                                    weight: 'bold'
                                }
                            },
                            legend: {
                                labels: {
                                    color: 'white'
                                }
                            }
                        }
                    }
                });

            });

        fetch('/dashboard/buscarPodio', {
            method: "GET"
        })
            .then(res => res.json())
            .then(podio => {

                console.log(podio);
                usuarioPodio.innerHTML = '';
                let contador = 1;

                for (let i = 0; i < podio.length; i++) {
                    usuarioPodio.innerHTML += `<div class="usuarios">
                    ${contador}º - <b>${podio[i].login}</b> acertos: ${podio[i].acertos}        
                    </div>`
                    contador++;
                }
            })


        fetch('/dashboard/buscarQtdVotos', {
            method: "GET"
        })
            .then(res => res.json())
            .then(qtdVotos => {

                console.log(qtdVotos[0]);

                resultadoKpi2.innerHTML = `${qtdVotos[0].votos}`;

            })


        fetch('/dashboard/buscarTentativasQuiz', {
            method: "GET"
        })
            .then(res => res.json())
            .then(qtdTentativas => {

                console.log(qtdTentativas[0]);

                resultadoKpi3.innerHTML = `${qtdTentativas[0].tentativas}`;

            })

        fetch('/dashboard/buscarAnimeMaisVotado', {
            method: "GET"
        })
            .then(res => res.json())
            .then(animeMaisVotado => {

                console.log(animeMaisVotado[0]);

                resultadoKpi1.innerHTML = `${animeMaisVotado[0].nomeAnime}`;

            })

    }




</script>
