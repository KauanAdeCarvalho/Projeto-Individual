    <script>
        const ctx = document.getElementById('graficoFavoritos').getContext('2d');

        const grafico = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: [
                    'Solo Leveling', 'One Piece', 'Jujutsu Kaisen',
                    'Demon Slayer', 'Attack on Titan',
                    'Frieren', 'Chainsaw Man', 'Naruto',
                    'My Hero Academy', 'Dan Da Dan'
                ],
                datasets: [{
                    label: '',
                    data: [12, 19, 8, 15, 10, 12, 7, 3, 11, 7],
                    backgroundColor: '#6366f1',
                    borderColor: 'white',
                    borderWidth: 3
                }]
            },
            options: {
                responsive: true,
                
                plugins: {
                    title: {
                        display: true,
                        text: 'Animes Favoritos',
                        color: '#ffffff',
                        font: {
                            size: 22,
                            weight: 'bold'
                        }
                    },
                    legend: {
                        display: false
                    }
                },

                scales: {
                    x: {
                        ticks: {
                            color: 'white',
                            font: {
                                size: 15
                            }
                        },
                    },
                    y: {
                        beginAtZero: true,
                        ticks: {
                            color: 'white',
                            font: {
                                size: 16
                            }
                        },
                    }
                }
            }
        });
